services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: greencart-backend
    ports:
      - "4000:4000"
    env_file:
      - ./server/.env
    restart: unless-stopped
    networks:
      - greencart-net

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: http://localhost:4000
    container_name: greencart-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - greencart-net

networks:
  greencart-net:
    driver: bridge