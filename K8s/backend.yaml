apiVersion: apps/v1
kind: Deployment
metadata:
  name: greencart-backend
  namespace: greencart
  labels:
    app: greencart-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: greencart-backend
  template:
    metadata:
      labels:
        app: greencart-backend
    spec:
      containers:
        - name: backend
          image: 547268988661.dkr.ecr.ap-south-1.amazonaws.com/greencart-backend:latest
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: greencart-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: greencart-backend
  namespace: greencart
spec:
  selector:
    app: greencart-backend
  ports:
    - protocol: TCP
      port: 4000
      targetPort: 4000
  type: ClusterIP